# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:

env:
  IMAGE: ghcr.io/dragonpaw/discord-bot

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build
        run: |
          export TAG=$(date "+%Y.%m.%d-%H.%M.%S")
          echo "Tag: $TAG"
          echo -n $TAG > BUILD_TAG
          docker build . --file Dockerfile \
            --tag ${IMAGE}:${TAG} \
            --tag ${IMAGE}:latest

      # - name: Test with pytest
      #   run: docker run ${IMAGE}:latest pytest

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        if: github.event_name == 'push'
        run: |
          export TAG=$(cat BUILD_TAG)
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${TAG}

      # actions/delete-package-versions v5 still runs on Node 20 (no Node 24
      # release available upstream as of 2026-05). GitHub forces Node 24 on
      # 2026-06-02; check for a newer release before then.
      - name: Prune old container images
        if: github.event_name == 'push'
        uses: actions/delete-package-versions@v5
        with:
          package-name: discord-bot
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
